version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clipforge
      POSTGRES_USER: clipforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clipforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/clipforge
      SPRING_DATASOURCE_USERNAME: clipforge
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-clipforge}
      SPRING_DATA_REDIS_HOST: redis
      STORAGE_PATH: /storage
    volumes:
      - storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./workers
    environment:
      BACKEND_URL: http://backend:8080
      REDIS_URL: redis://redis:6379
      STORAGE_PATH: /storage
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HF_TOKEN: ${HF_TOKEN:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
    volumes:
      - storage:/storage
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  postgres_data:
  storage:
